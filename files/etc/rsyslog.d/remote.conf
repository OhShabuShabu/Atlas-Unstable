# ============================================================================
# REMOTE SYSLOG CONFIGURATION
# ============================================================================
# Forwards critical security logs to remote syslog server.
# Falls back to local buffering if remote unavailable.
#
# TO CONFIGURE:
#   1. Set up a remote syslog server (e.g., rsyslog, syslog-ng)
#   2. Replace @@REPLACE_ME_WITH_YOUR_SYSLOG_SERVER:514 with your server
#   3. Run: sudo systemctl restart rsyslog
#   4. Verify: sudo journalctl -u rsyslog -n 20
#
# Protocol:
#   @@  = TCP (reliable, with TLS if supported)
#   @   = UDP (faster but unreliable)
#   Use TLS for untrusted networks

# === REMOTE FORWARDING (uncomment and configure) ===
# For TCP+TLS (recommended):
# *.* @@YOUR_SYSLOG_SERVER:514
#
# For UDP:
# *.* @YOUR_SYSLOG_SERVER:514
#
# Forward only auth/security logs (audit-verbose):
# auth.*   @@YOUR_SYSLOG_SERVER:514
# authpriv.* @@YOUR_SYSLOG_SERVER:514
# local1.* @@YOUR_SYSLOG_SERVER:514

# === QUEUE / BUFFER (uncomment to enable) ===
# Buffer to disk if remote unavailable:
# $ActionQueueType LinkedList
# $ActionQueueFileName remote_fwd
# $ActionQueueMaxDiskSpace 1g
# $ActionQueueSaveOnShutdown on
# $ActionQueueDiscardSeverity 3

# ============================================================================
# LOCAL LOG CONFIGURATION
# ============================================================================
# Preserve local logging as fallback (always active)
$FileCreateMode 0640
$DirCreateMode 0750
$Umask 0037
